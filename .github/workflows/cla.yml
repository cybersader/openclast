name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
      || github.event_name == 'pull_request_target'
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-document: 'https://github.com/cybersader/obsidian-in-enterprise/blob/main/CLA.md'
          branch: 'main'
          allowlist: cybersader,bot*
          remote-organization-name: false
          remote-repository-name: false
          create-file-commit-message: 'chore: create CLA signature file'
          signed-commit-message: 'chore: $contributorName signed the CLA'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this, you need to sign our [Contributor License Agreement](https://github.com/cybersader/obsidian-in-enterprise/blob/main/CLA.md).

            To sign, please comment below with:

            `I have read the CLA Document and I hereby sign the CLA`
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Thank you!'
          lock-pullrequest-aftermerge: false
